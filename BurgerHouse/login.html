<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish - BurgerHouse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/main.js"></script>
</head>

<body
    class="bg-dark-900 text-slate-50 font-outfit antialiased selection:bg-primary-500 selection:text-white flex flex-col min-h-screen">

    <!-- Simple Navbar -->
    <nav class="absolute w-full z-40 top-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20 border-b border-white/10">
                <div class="flex-shrink-0 flex items-center gap-2 cursor-pointer"
                    onclick="window.location.href='index.html'">
                    <div
                        class="w-10 h-10 rounded-full bg-primary-500 flex items-center justify-center text-white text-xl font-bold">
                        <i class="fas fa-hamburger"></i>
                    </div>
                    <span class="font-bold text-2xl tracking-tight text-white">Burger<span
                            class="text-primary-500">House</span></span>
                </div>
                <a href="index.html"
                    class="text-sm font-medium text-gray-400 hover:text-white transition flex items-center gap-2">
                    <i class="fas fa-arrow-left"></i> Asosiyga qaytish
                </a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="flex-1 flex flex-col justify-center items-center px-4 relative mt-16 pb-12">
        <div
            class="absolute inset-0 z-0 opacity-20 bg-[url('https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&w=1920&q=80')] bg-cover bg-center">
        </div>
        <div class="absolute inset-0 z-0 bg-gradient-to-t from-dark-900 via-dark-900/90 to-dark-900/70"></div>

        <div
            class="glass-card rounded-3xl p-8 md:p-10 w-full max-w-md relative z-10 border border-primary-500/20 shadow-2xl shadow-primary-500/10 backdrop-blur-xl">
            <div class="text-center mb-8">
                <div
                    class="w-16 h-16 bg-primary-500/10 rounded-full flex items-center justify-center mx-auto mb-4 text-primary-500 text-3xl shadow-inner border border-primary-500/30">
                    <i class="fas fa-sign-in-alt"></i>
                </div>
                <h1 class="text-3xl font-bold text-white mb-2">Xush kelibsiz!</h1>
                <p class="text-gray-400 text-sm">Tizimga kirish uchun ma'lumotlaringizni kiriting</p>
            </div>

            <form onsubmit="event.preventDefault(); window.location.href='profile.html';" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Telefon raqam</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-phone text-gray-500"></i>
                        </div>
                        <input type="tel" required
                            class="w-full bg-dark-800/50 border border-white/10 rounded-xl pl-10 px-4 py-3 text-white focus:outline-none focus:border-primary-500 focus:bg-dark-800 transition shadow-inner"
                            placeholder="+998 90 123 45 67">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-medium text-gray-300">Parol</label>
                        <a href="#"
                            class="text-xs text-primary-500 hover:text-primary-400 transition font-medium">Parolni
                            unutdingizmi?</a>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-500"></i>
                        </div>
                        <input type="password" required
                            class="w-full bg-dark-800/50 border border-white/10 rounded-xl pl-10 px-4 py-3 text-white focus:outline-none focus:border-primary-500 focus:bg-dark-800 transition shadow-inner"
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="remember"
                        class="w-4 h-4 rounded border-gray-600 bg-dark-800 text-primary-500 focus:ring-primary-500 cursor-pointer">
                    <label for="remember" class="ml-2 text-sm text-gray-400 cursor-pointer">Eslab qolish</label>
                </div>

                <div class="pt-2">
                    <button type="submit"
                        class="w-full bg-primary-500 hover:bg-primary-600 text-white rounded-xl py-3.5 font-bold text-lg transition shadow-lg shadow-primary-500/30 flex items-center justify-center gap-2">
                        Kirish <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </form>

            <div class="mt-8 text-center text-sm text-gray-400 border-t border-white/10 pt-6">
                Hisobingiz yo'qmi?
                <a href="register.html" class="text-primary-500 hover:text-white font-bold transition ml-1">Ro'yxatdan
                    o'tish</a>
            </div>
        </div>
    </div>

</body>

</html>
